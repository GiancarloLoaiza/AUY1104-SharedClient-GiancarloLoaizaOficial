 # ─────────────────────────────────────────────────────────────
 # Este archivo vive en el repo del alumno / del proyecto.
 # Cuando publicas una versión con etiqueta tipo v1.2.3, GitHub ejecuta
 # la receta del repo central (SharedWorkflows) para empaquetar y subir la imagen.
 # ─────────────────────────────────────────────────────────────
on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:

jobs:
  usar-receta-compartida:
  # Aquí no repetimos los pasos de Docker: delegamos al otro repositorio
    uses: GiancarloLoaiza/AUY1104-SharedWorkflows-GiancarloLoaizaOficial/.github/workflows/deploy-api.yaml@main

  # Valores que le “pasamos” a la receta (nombre de la imagen y qué versión es)
    with:
      image-name: demo-api
  # Mismo nombre que el tag que disparó el workflow (ej. v1.2.3 → la imagen lleva esa “versión”)
      image-tag: ${{ github.ref_name }}

  # Datos sensibles: usuario y contraseña/token de Docker Hub (configurados en GitHub → Secrets)
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}